name: opendata-ai

x-ollama-base: &ollama-base
  # Pre-built image with qwen2.5:16k (num_ctx=16384) already baked in.
  # Published via .github/workflows/publish-ollama.yml.
  # Fallback: set OLLAMA_IMAGE=ollama/ollama:latest and run `make pull-models`.
  image: ${OLLAMA_IMAGE:-ghcr.io/agent-engineering-studio/opendata-ai-ollama:latest}
  # Default to `if_not_present` so a locally-built image (via `make build-ollama`)
  # isn't silently overwritten by the registry. Override to `always` only when you
  # explicitly want the GHCR tag to win.
  pull_policy: ${OLLAMA_PULL_POLICY:-if_not_present}
  container_name: opendata-ai-ollama
  ports:
    - "${OLLAMA_PORT:-11434}:11434"
  volumes:
    - ollama_data:/root/.ollama
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "ollama", "list"]
    interval: 15s
    timeout: 5s
    retries: 10
    start_period: 30s

services:
  # ───── Ollama — GPU profile ─────
  ollama-gpu:
    <<: *ollama-base
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ───── Ollama — CPU profile ─────
  ollama-cpu:
    <<: *ollama-base
    profiles: ["cpu"]

  # ───── CKAN MCP server (Streamable HTTP) ─────
  ckan-mcp:
    build:
      context: ./ckan-mcp-server
      dockerfile: Dockerfile
    image: ckan-mcp-server:local
    container_name: ckan-mcp
    ports:
      - "${CKAN_MCP_PORT:-8080}:8080"
    environment:
      TRANSPORT: streamable-http
      HOST: 0.0.0.0
      PORT: "8080"
      MCP_PATH: /mcp
      CKAN_DEFAULT_BASE_URL: ${CKAN_DEFAULT_BASE_URL:-https://www.dati.gov.it/opendata}
      CKAN_HTTP_TIMEOUT: "30"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped

  # ───── ISTAT MCP server (Streamable HTTP) ─────
  istat-mcp:
    build:
      context: ./istat-mcp-server
      dockerfile: Dockerfile
    image: istat-mcp-server:local
    container_name: istat-mcp
    ports:
      - "${ISTAT_MCP_PORT:-8081}:8081"
    environment:
      TRANSPORT: streamable-http
      HOST: 0.0.0.0
      PORT: "8081"
      MCP_PATH: /mcp
      ISTAT_SDMX_BASE_URL: ${ISTAT_SDMX_BASE_URL:-https://esploradati.istat.it/SDMXWS/rest}
      ISTAT_HTTP_TIMEOUT: "60"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped

  # ───── CKAN specialist agent (standalone debug entry on :8002) ─────
  ckan-agent:
    build:
      context: ./ckan-mcp-agent
      dockerfile: Dockerfile
    image: ckan-mcp-agent:local
    container_name: ckan-agent
    ports:
      - "${CKAN_AGENT_PORT:-8002}:8002"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://opendata-ai-ollama:11434}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-qwen2.5:16k}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-16384}
      MCP_SERVER_URL: ${CKAN_MCP_URL:-http://ckan-mcp:8080/mcp}
      CKAN_DEFAULT_BASE_URL: ${CKAN_DEFAULT_BASE_URL:-https://www.dati.gov.it/opendata}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      API_HOST: 0.0.0.0
      API_PORT: "8002"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      ckan-mcp:
        condition: service_started
      ollama-cpu:
        condition: service_healthy
        required: false
      ollama-gpu:
        condition: service_healthy
        required: false
    restart: unless-stopped

  # ───── ISTAT specialist agent (standalone debug entry on :8003) ─────
  istat-agent:
    build:
      context: ./istat-mcp-agent
      dockerfile: Dockerfile
    image: istat-mcp-agent:local
    container_name: istat-agent
    ports:
      - "${ISTAT_AGENT_PORT:-8003}:8003"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://opendata-ai-ollama:11434}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-qwen2.5:16k}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-16384}
      MCP_SERVER_URL: ${ISTAT_MCP_URL:-http://istat-mcp:8081/mcp}
      ISTAT_SDMX_BASE_URL: ${ISTAT_SDMX_BASE_URL:-https://esploradati.istat.it/SDMXWS/rest}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      API_HOST: 0.0.0.0
      API_PORT: "8003"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      istat-mcp:
        condition: service_started
      ollama-cpu:
        condition: service_healthy
        required: false
      ollama-gpu:
        condition: service_healthy
        required: false
    restart: unless-stopped

  # ───── Orchestrator (fan-out CKAN + ISTAT, synthesise) — main UI entry on :8000 ─────
  opendata-orchestrator:
    build:
      context: ./opendata-orchestrator
      dockerfile: Dockerfile
    image: opendata-orchestrator:local
    container_name: opendata-orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://opendata-ai-ollama:11434}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-qwen2.5:16k}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-16384}
      CKAN_MCP_URL: ${CKAN_MCP_URL:-http://ckan-mcp:8080/mcp}
      ISTAT_MCP_URL: ${ISTAT_MCP_URL:-http://istat-mcp:8081/mcp}
      EUROSTAT_MCP_URL: ${EUROSTAT_MCP_URL:-}
      OECD_MCP_URL: ${OECD_MCP_URL:-}
      CKAN_DEFAULT_BASE_URL: ${CKAN_DEFAULT_BASE_URL:-https://www.dati.gov.it/opendata}
      ISTAT_SDMX_BASE_URL: ${ISTAT_SDMX_BASE_URL:-https://esploradati.istat.it/SDMXWS/rest}
      EUROSTAT_SDMX_BASE_URL: ${EUROSTAT_SDMX_BASE_URL:-https://ec.europa.eu/eurostat/api/dissemination/sdmx/2.1}
      OECD_SDMX_BASE_URL: ${OECD_SDMX_BASE_URL:-https://sdmx.oecd.org/public/rest}
      ENABLE_CKAN: ${ENABLE_CKAN:-true}
      ENABLE_ISTAT: ${ENABLE_ISTAT:-true}
      ENABLE_EUROSTAT: ${ENABLE_EUROSTAT:-false}
      ENABLE_OECD: ${ENABLE_OECD:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      ckan-mcp:
        condition: service_started
      istat-mcp:
        condition: service_started
      ollama-cpu:
        condition: service_healthy
        required: false
      ollama-gpu:
        condition: service_healthy
        required: false
    restart: unless-stopped

  # ───── Web UI (Next.js) — points at the orchestrator ─────
  opendata-ai-ui:
    build:
      context: ./opendata-ai-ui
      dockerfile: Dockerfile
    image: opendata-ai-ui:local
    container_name: opendata-ai-ui
    ports:
      - "${UI_PORT:-3000}:3000"
    environment:
      AGENT_API_URL: ${AGENT_API_URL:-http://opendata-orchestrator:8000}
    depends_on:
      opendata-orchestrator:
        condition: service_started
    restart: unless-stopped

volumes:
  ollama_data:
    name: opendata-ai-ollama-data
