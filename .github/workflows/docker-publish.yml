name: docker-publish

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]
    paths:
      - 'ckan-mcp-server/**'
      - 'ckan-mcp-agent/**'
      - 'istat-mcp-server/**'
      - 'osm-mcp/**'
      - 'istat-mcp-agent/**'
      - 'opendata-orchestrator/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Tag the built images as :latest'
        required: false
        default: 'true'
        type: choice
        options: [ 'true', 'false' ]

permissions:
  contents: read
  packages: write           # required to push to GHCR
  id-token: write           # for future cosign / keyless signing

env:
  REGISTRY: ghcr.io
  # Images are published as:
  #   ghcr.io/<owner>/ckan-mcp-server:<tag>
  #   ghcr.io/<owner>/ckan-mcp-agent:<tag>
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: ckan-mcp-server
            context: ckan-mcp-server
            dockerfile: ckan-mcp-server/Dockerfile
          - name: ckan-mcp-agent
            context: ckan-mcp-agent
            dockerfile: ckan-mcp-agent/Dockerfile
          - name: istat-mcp-server
            context: istat-mcp-server
            dockerfile: istat-mcp-server/Dockerfile
          - name: istat-mcp-agent
            context: istat-mcp-agent
            dockerfile: istat-mcp-agent/Dockerfile
          - name: osm-mcp
            context: osm-mcp
            dockerfile: osm-mcp/Dockerfile
          - name: opendata-orchestrator
            context: opendata-orchestrator
            dockerfile: opendata-orchestrator/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        id: owner
        run: echo "value=${IMAGE_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.event.inputs.push_latest == 'true' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.service.name }}
            org.opencontainers.image.description=${{ matrix.service.name }} — part of opendata-ai
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max

      - name: Job summary
        run: |
          {
            echo "### Published \`${{ matrix.service.name }}\`"
            echo ""
            echo "**Digest:** \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
