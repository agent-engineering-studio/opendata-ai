name: docker-publish

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]
    paths:
      - 'opendata_core/**'
      - 'ckan-mcp-server/**'
      - 'istat-mcp-server/**'
      - 'osm-mcp/**'
      - 'web-mcp/**'
      - 'opendata-backend/**'
      - 'opendata-ai-ui/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Tag the built images as :latest'
        required: false
        default: 'true'
        type: choice
        options: [ 'true', 'false' ]

permissions:
  contents: read
  packages: write           # required to push to GHCR
  id-token: write           # for future cosign / keyless signing

env:
  REGISTRY: ghcr.io
  # Images are published as:
  #   ghcr.io/<owner>/ckan-mcp-server:<tag>
  #   ghcr.io/<owner>/istat-mcp-server:<tag>
  #   ghcr.io/<owner>/osm-mcp:<tag>
  #   ghcr.io/<owner>/opendata-backend:<tag>
  #   ghcr.io/<owner>/opendata-ai-ui:<tag>
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          # Backend services build from repo root so they can copy the shared
          # opendata_core/ package in alongside their own sources.
          - name: ckan-mcp-server
            context: .
            dockerfile: ckan-mcp-server/Dockerfile
          - name: istat-mcp-server
            context: .
            dockerfile: istat-mcp-server/Dockerfile
          - name: opencoesione-mcp-server
            context: .
            dockerfile: opencoesione-mcp-server/Dockerfile
          - name: ispra-mcp-server
            context: .
            dockerfile: ispra-mcp-server/Dockerfile
          - name: osm-mcp
            context: .
            dockerfile: osm-mcp/Dockerfile
          - name: web-mcp
            context: .
            dockerfile: web-mcp/Dockerfile
          - name: opendata-backend
            context: .
            dockerfile: opendata-backend/Dockerfile
          # UI is a self-contained Next.js app; build from its own directory
          # so the `output: 'export'` bundle is produced cleanly. NEXT_PUBLIC_*
          # are baked at build time — pass them via repo variables/secrets
          # (set vars: NEXT_PUBLIC_API_URL, NEXT_PUBLIC_CLERK_SIGN_IN_URL,
          # NEXT_PUBLIC_CLERK_SIGN_UP_URL; secret: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY).
          - name: opendata-ai-ui
            context: opendata-ai-ui
            dockerfile: opendata-ai-ui/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set lowercase image owner
        id: owner
        run: echo "value=${IMAGE_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.event.inputs.push_latest == 'true' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.service.name }}
            org.opencontainers.image.description=${{ matrix.service.name }} — part of opendata-ai
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          # Context depends on the service — backend images build from repo
          # root to access opendata_core/, the UI builds from its own dir.
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # next.config.ts uses `output: 'export'` so NEXT_PUBLIC_* must be
          # baked at build time. Unused by other services — docker/build-push
          # silently ignores build-args the Dockerfile doesn't declare.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=${{ vars.NEXT_PUBLIC_CLERK_SIGN_IN_URL }}
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=${{ vars.NEXT_PUBLIC_CLERK_SIGN_UP_URL }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max

      - name: Job summary
        run: |
          {
            echo "### Published \`${{ matrix.service.name }}\`"
            echo ""
            echo "**Digest:** \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
