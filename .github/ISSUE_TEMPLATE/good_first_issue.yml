name: Good first issue
description: Create a beginner-friendly contribution task
title: "good first issue: "
labels: ["good first issue", "help wanted"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What should a new contributor do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this useful?
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Suggested files or components
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
