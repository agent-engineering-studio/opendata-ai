# Pesi per dimensione del punteggio di maturità open-data di un ente (Fase 0).
# score_overall = Σ (weights[dim] * score_dim), con score_dim in [0, 1].
# I pesi devono sommare a 1.0. `level` deriva da score_overall via le soglie.
version: 1

weights:
  policy: 0.25    # presenza di policy/linee guida open-data, licenze, governance
  portal: 0.25    # qualità del portale: copertura, metadati, API, aggiornamento
  quality: 0.30   # qualità dei dataset: FAIR, DCAT-AP_IT, 5-stars, freschezza
  impact: 0.20    # impatto/uso: riuso, HVD, valorizzazione sul territorio

# Soglie crescenti su score_overall (0..1) → etichetta di livello.
levels:
  - {min: 0.00, name: "iniziale"}
  - {min: 0.40, name: "base"}
  - {min: 0.60, name: "avanzato"}
  - {min: 0.80, name: "maturo"}
