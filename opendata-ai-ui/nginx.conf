server {
    listen 3000;
    listen [::]:3000;

    # Behind Traefik/TLS — trust the proxy's Host header for redirects
    # and never include the listen port (3000 is internal). Without these,
    # nginx's automatic trailing-slash 301 ships `http://host:3000/...`
    # which is both wrong scheme and a leaked internal port.
    absolute_redirect off;
    port_in_redirect  off;

    root  /usr/share/nginx/html;
    index index.html;

    # Clerk accumula più cookie di sessione (il JWT `__session`, `__client`,
    # `__client_uat`, `__clerk_db_jwt`…) che il browser concatena in un'unica
    # riga `Cookie:` su OGNI richiesta same-origin. Col default `4 8k` nginx la
    # rifiuta con 400 Bad Request (su ogni path, favicon incluso); inoltre il
    # parametro query `__clerk_handshake` (JWT lungo) gonfia la request-line →
    # 414. Buffer più ampi assorbono entrambi.
    large_client_header_buffers 8 32k;

    # Long cache for hashed Next.js static assets.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # `output: 'export'` writes <route>/index.html for each page. We want
    # /foo to serve /foo/index.html, /foo.html, or fall back to /404.html
    # without a 301 dance — clients (and Clerk's redirect URLs) hate the
    # implicit trailing-slash redirect.
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ /404.html;
    }

    error_page 404 /404.html;
    location = /404.html { internal; }
}
